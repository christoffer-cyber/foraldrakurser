
</div>

<button class="navbtn" id="prev" aria-label="Föregående">‹</button>
<button class="navbtn" id="next" aria-label="Nästa">›</button>
<div class="dots" id="dots"></div>
<div class="counter" id="counter"><b>1</b> / 15</div>
<div class="hint" id="hint">← → bläddra · F helskärm</div>
<div class="player" id="player">
  <button class="pbtn pplay" id="pPlay" aria-label="Spela uppläsning">▶</button>
  <button class="pbtn skip" id="pBack" aria-label="Bakåt 15 sekunder">−15</button>
  <div class="pbar" id="pBar"><div class="pfill" id="pFill"></div></div>
  <span class="ptime" id="pTime">Lyssna</span>
  <button class="pbtn skip" id="pFwd" aria-label="Framåt 15 sekunder">+15</button>
  <select class="plang" id="langSel" aria-label="Språk">
    <option value="sv">Svenska</option>
    <option value="en">English</option>
    <option value="ar">العربية</option>
    <option value="so">Soomaali</option>
    <option value="fa">فارسی</option>
    <option value="no">Norsk</option>
  </select>
</div>

<script>
  const slides = Array.from(document.querySelectorAll('.slide'));
  const total = slides.length;
  let i = 0;
  const progress = document.getElementById('progress');
  const counter = document.getElementById('counter');
  const dotsWrap = document.getElementById('dots');
  const hint = document.getElementById('hint');

  slides.forEach((_, idx) => {
    const b = document.createElement('button');
    b.addEventListener('click', () => go(idx));
    dotsWrap.appendChild(b);
  });
  const dots = Array.from(dotsWrap.children);

  function render(){
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    dots.forEach((d, idx) => d.classList.toggle('on', idx === i));
    progress.style.width = ((i) / (total - 1) * 100) + '%';
    counter.innerHTML = '<b>' + (i + 1) + '</b> / ' + total;
  }
  function go(n){ i = Math.max(0, Math.min(total - 1, n)); render(); }
  function next(){ go(i + 1); }
  function prev(){ go(i - 1); }

  document.getElementById('next').addEventListener('click', next);
  document.getElementById('prev').addEventListener('click', prev);

  document.addEventListener('keydown', e => {
    if(['ArrowRight','PageDown',' '].includes(e.key)){ e.preventDefault(); next(); }
    else if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); prev(); }
    else if(e.key === 'Home'){ go(0); }
    else if(e.key === 'End'){ go(total - 1); }
    else if(e.key.toLowerCase() === 'f'){
      if(!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  });

  let tx = null;
  document.addEventListener('touchstart', e => tx = e.changedTouches[0].clientX, {passive:true});
  document.addEventListener('touchend', e => {
    if(tx === null) return;
    const dx = e.changedTouches[0].clientX - tx;
    if(Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
    tx = null;
  }, {passive:true});

  setTimeout(() => hint.classList.add('fade'), 5000);

  // ---- per-slide narration player + inline audio buttons ----
  const langSel = document.getElementById('langSel');
  const sl = localStorage.getItem('kurs-lang'); if(sl) langSel.value = sl;
  const pPlay=document.getElementById('pPlay'), pBack=document.getElementById('pBack'),
        pFwd=document.getElementById('pFwd'), pBar=document.getElementById('pBar'),
        pFill=document.getElementById('pFill'), pTime=document.getElementById('pTime');
  let nar=null, aff=null, affBtn=null, toastEl;

  function fmt(t){ t=isFinite(t)?t:0; const m=Math.floor(t/60), s=Math.floor(t%60); return m+':'+(s<10?'0':'')+s; }
  function paint(){ const d=(nar&&isFinite(nar.duration))?nar.duration:0, c=nar?nar.currentTime:0;
    pFill.style.width=(d?c/d*100:0)+'%'; pTime.textContent=fmt(c)+' / '+fmt(d); }
  function icon(p){ pPlay.textContent=p?'❚❚':'▶'; pPlay.classList.toggle('on',p); }
  function toast(m){ if(!toastEl){ toastEl=document.createElement('div'); toastEl.className='narrate-toast'; document.body.appendChild(toastEl); }
    toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),2400); }

  function stopAff(){ if(aff){ aff.pause(); aff=null; } if(affBtn){ affBtn.classList.remove('playing'); affBtn.textContent='▶'; affBtn=null; } }
  function resetPlayer(){ if(nar){ nar.pause(); nar=null; } icon(false); pFill.style.width='0%'; pTime.textContent='Lyssna'; }
  function loadNar(){
    stopAff();
    nar=new Audio('audio/narration/'+langSel.value+'/slide-'+(i+1)+'.mp3');
    nar.addEventListener('timeupdate',paint);
    nar.addEventListener('loadedmetadata',paint);
    nar.addEventListener('ended',()=>icon(false));
    nar.addEventListener('error',()=>{ toast('Uppläsning läggs till snart'); resetPlayer(); });
  }
  pPlay.addEventListener('click',()=>{
    if(!nar) loadNar();
    if(nar.paused){ stopAff(); nar.play().then(()=>icon(true)).catch(()=>{}); }
    else { nar.pause(); icon(false); }
  });
  pBack.addEventListener('click',()=>{ if(nar) nar.currentTime=Math.max(0,nar.currentTime-15); });
  pFwd.addEventListener('click',()=>{ if(nar&&isFinite(nar.duration)) nar.currentTime=Math.min(nar.duration,nar.currentTime+15); });
  pBar.addEventListener('click',e=>{ if(!nar||!isFinite(nar.duration)) return; const r=pBar.getBoundingClientRect();
    nar.currentTime=Math.min(nar.duration,Math.max(0,(e.clientX-r.left)/r.width*nar.duration)); paint(); });
  langSel.addEventListener('change',()=>{ localStorage.setItem('kurs-lang',langSel.value); resetPlayer(); });

  // inline affirmation / exercise buttons (.play)
  document.addEventListener('click', e => {
    const btn=e.target.closest('.play'); if(!btn) return;
    const same=(btn===affBtn);
    if(nar){ nar.pause(); icon(false); }
    stopAff();
    if(same) return;
    aff=new Audio(btn.dataset.src); affBtn=btn;
    btn.classList.add('playing'); btn.textContent='❚❚';
    aff.play().catch(()=>{});
    aff.onended=()=>{ if(btn===affBtn) stopAff(); };
    aff.onerror=()=>{ toast('Ljud läggs till snart'); stopAff(); };
  });

  let _go = go;
  go = function(n){ if(nar) nar.pause(); stopAff(); _go(n); resetPlayer(); };

  render();
</script>
</body>
</html>
