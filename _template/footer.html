
</div>

<button class="navbtn" id="prev" aria-label="Föregående">‹</button>
<button class="navbtn" id="next" aria-label="Nästa">›</button>
<div class="dots" id="dots"></div>
<div class="counter" id="counter"><b>1</b> / 15</div>
<div class="hint" id="hint">← → bläddra · F helskärm</div>
<div class="narrate">
  <button class="narrate-btn" id="narrateBtn" aria-label="Lyssna på sidan">▶ <span>Lyssna</span></button>
  <select id="langSel" aria-label="Språk">
    <option value="sv">Svenska</option>
    <option value="en">English</option>
    <option value="ar">العربية</option>
    <option value="so">Soomaali</option>
    <option value="fa">فارسی</option>
  </select>
</div>

<script>
  const slides = Array.from(document.querySelectorAll('.slide'));
  const total = slides.length;
  let i = 0;
  const progress = document.getElementById('progress');
  const counter = document.getElementById('counter');
  const dotsWrap = document.getElementById('dots');
  const hint = document.getElementById('hint');

  slides.forEach((_, idx) => {
    const b = document.createElement('button');
    b.addEventListener('click', () => go(idx));
    dotsWrap.appendChild(b);
  });
  const dots = Array.from(dotsWrap.children);

  function render(){
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    dots.forEach((d, idx) => d.classList.toggle('on', idx === i));
    progress.style.width = ((i) / (total - 1) * 100) + '%';
    counter.innerHTML = '<b>' + (i + 1) + '</b> / ' + total;
  }
  function go(n){ i = Math.max(0, Math.min(total - 1, n)); render(); }
  function next(){ go(i + 1); }
  function prev(){ go(i - 1); }

  document.getElementById('next').addEventListener('click', next);
  document.getElementById('prev').addEventListener('click', prev);

  document.addEventListener('keydown', e => {
    if(['ArrowRight','PageDown',' '].includes(e.key)){ e.preventDefault(); next(); }
    else if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); prev(); }
    else if(e.key === 'Home'){ go(0); }
    else if(e.key === 'End'){ go(total - 1); }
    else if(e.key.toLowerCase() === 'f'){
      if(!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  });

  let tx = null;
  document.addEventListener('touchstart', e => tx = e.changedTouches[0].clientX, {passive:true});
  document.addEventListener('touchend', e => {
    if(tx === null) return;
    const dx = e.changedTouches[0].clientX - tx;
    if(Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
    tx = null;
  }, {passive:true});

  setTimeout(() => hint.classList.add('fade'), 5000);

  // ---- unified audio: affirmations + per-slide narration ----
  let curAudio = null, curBtn = null, curKind = null;
  function resetBtn(){
    if(!curBtn) return;
    curBtn.classList.remove('playing');
    if(curKind === 'aff'){ curBtn.textContent = '▶'; }
    else { const s = curBtn.querySelector('span'); if(s) s.textContent = 'Lyssna'; }
    curBtn = null;
  }
  function stopAudio(){ if(curAudio){ curAudio.pause(); curAudio = null; } resetBtn(); curKind = null; }
  function playSrc(src, btn, kind){
    const same = (btn === curBtn);
    stopAudio();
    if(same) return;
    const a = new Audio(src); curAudio = a; curBtn = btn; curKind = kind;
    btn.classList.add('playing');
    if(kind === 'aff'){ btn.textContent = '❚❚'; }
    else { const s = btn.querySelector('span'); if(s) s.textContent = 'Spelar…'; }
    a.play().catch(()=>{});
    a.onended = () => { if(btn === curBtn) stopAudio(); };
    a.onerror = () => { if(kind === 'nar') toast('Uppläsning läggs till snart'); if(btn === curBtn) stopAudio(); };
  }
  document.addEventListener('click', e => {
    const btn = e.target.closest('.play');
    if(btn) playSrc(btn.dataset.src, btn, 'aff');
  });

  // per-slide narration (any language, Maries röst)
  const langSel = document.getElementById('langSel');
  const narrateBtn = document.getElementById('narrateBtn');
  const savedLang = localStorage.getItem('kurs-lang');
  if(savedLang) langSel.value = savedLang;
  langSel.addEventListener('change', () => { localStorage.setItem('kurs-lang', langSel.value); stopAudio(); });
  narrateBtn.addEventListener('click', () => {
    playSrc('audio/narration/' + langSel.value + '/slide-' + (i + 1) + '.mp3', narrateBtn, 'nar');
  });

  let toastEl;
  function toast(msg){
    if(!toastEl){ toastEl = document.createElement('div'); toastEl.className = 'narrate-toast'; document.body.appendChild(toastEl); }
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  let _go = go;
  go = function(n){ stopAudio(); _go(n); };

  render();
</script>
</body>
</html>
